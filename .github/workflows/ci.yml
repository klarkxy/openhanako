name: CI

on:
  schedule:
    # 每天 UTC 1:30（daily-release 前 30 分钟）
    - cron: '30 1 * * *'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build packages
        run: npm run build:packages

      - name: Build renderer
        run: npm run build:renderer

      - name: Run tests
        run: npm test
